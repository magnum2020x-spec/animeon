<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>إنشاء حساب جديد | Anime On</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        margin: 0;
        padding: 0;
        font-family: "Cairo", sans-serif;
        background: #0b0c10;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        color: white;
      }

      .signup-card {
        background: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(15px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 20px;
        padding: 30px;
        width: 380px;
        text-align: center;
        box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
      }

      h2 {
        color: #45f3ff;
        margin-bottom: 20px;
        text-shadow: 0 0 10px rgba(69, 243, 255, 0.3);
      }

      .input-group {
        margin-bottom: 15px;
        text-align: right;
      }

      label {
        display: block;
        margin-bottom: 5px;
        font-size: 14px;
        color: #ccc;
      }

      input {
        width: 100%;
        padding: 10px;
        background: rgba(255, 255, 255, 0.1);
        border: 1px solid #444;
        border-radius: 8px;
        color: #fff;
        outline: none;
        transition: 0.3s;
        box-sizing: border-box;
      }

      input:focus {
        border-color: #45f3ff;
        box-shadow: 0 0 8px rgba(69, 243, 255, 0.3);
      }

      .signup-btn {
        width: 100%;
        padding: 12px;
        background: #45f3ff;
        border: none;
        border-radius: 8px;
        color: #0b0c10;
        font-weight: bold;
        font-size: 16px;
        cursor: pointer;
        transition: 0.3s;
        margin-top: 10px;
      }

      .signup-btn:hover {
        background: #33c7d1;
        transform: translateY(-2px);
      }

      .footer-links {
        margin-top: 20px;
        font-size: 14px;
      }

      .footer-links a {
        color: #45f3ff;
        text-decoration: none;
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <div class="signup-card">
      <h2>إنشاء حساب Anime On</h2>

      <form>
        <div class="input-group">
          <label>الاسم الكامل</label>
          <input type="text" placeholder="أدخل اسمك بالكامل" />
        </div>

        <div class="input-group">
          <label>البريد الإلكتروني</label>
          <input type="email" placeholder="example@mail.com" />
        </div>

        <div class="input-group">
          <label>كلمة المرور</label>
          <input type="password" placeholder="********" />
        </div>

        <div class="input-group">
          <label>تأكيد كلمة المرور</label>
          <input type="password" placeholder="********" />
        </div>

        <button type="submit" class="signup-btn">اشترك الآن</button>
      </form>

      <div class="footer-links">
        لديك حساب بالفعل؟ <a href="login.html">تسجيل الدخول</a>
      </div>
    </div>
    <script
      type="text/javascript"
      src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"
    ></script>

    <script src="../assets/js/auth.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
      // 1. تهيئة الاتصال بالسيرفر
      const supabaseUrl = "sb_publishable_gyVMI0dal37Dlns1b0dMHA_MfCier2o";
      const supabaseKey = "sb_secret_NNe_xkTtza6LNetYp1BIQg_RY2K0cGd";
      const supabase = supabasejs.createClient(supabaseUrl, supabaseKey);

      // 2. دالة التسجيل
      async function signUpUser(email, password) {
        const { data, error } = await supabase.auth.signUp({
          email: email,
          password: password,
        });

        if (error) {
          alert("خطأ في التسجيل: " + error.message);
        } else {
          alert("تم إرسال رسالة تأكيد لبريدك الإلكتروني!");
        }
      }
    </script>
  </body>
</html>
<script src="../pages/auth.js"></script>

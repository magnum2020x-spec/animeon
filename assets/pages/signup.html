<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>إنشاء حساب جديد | Anime On</title>
    <!-- Google Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <style>
      body {
        margin: 0;
        padding: 0;
        font-family: "Cairo", sans-serif;
        background: #0b0c10;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        color: white;
      }

      .signup-card {
        background: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(15px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 20px;
        padding: 30px;
        width: 380px;
        text-align: center;
        box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
      }

      h2 {
        color: #45f3ff;
        margin-bottom: 20px;
        text-shadow: 0 0 10px rgba(69, 243, 255, 0.3);
      }

      .input-group {
        margin-bottom: 15px;
        text-align: right;
      }

      label {
        display: block;
        margin-bottom: 5px;
        font-size: 14px;
        color: #ccc;
      }

      input {
        width: 100%;
        padding: 10px;
        background: rgba(255, 255, 255, 0.1);
        border: 1px solid #444;
        border-radius: 8px;
        color: #fff;
        outline: none;
        transition: 0.3s;
        box-sizing: border-box;
      }

      input:focus {
        border-color: #45f3ff;
        box-shadow: 0 0 8px rgba(69, 243, 255, 0.3);
      }

      .signup-btn {
        width: 100%;
        padding: 12px;
        background: #45f3ff;
        border: none;
        border-radius: 8px;
        color: #0b0c10;
        font-weight: bold;
        font-size: 16px;
        cursor: pointer;
        transition: 0.3s;
        margin-top: 10px;
      }

      .signup-btn:hover {
        background: #33c7d1;
        transform: translateY(-2px);
      }

      .footer-links {
        margin-top: 20px;
        font-size: 14px;
      }

      .footer-links a {
        color: #45f3ff;
        text-decoration: none;
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <div class="signup-card">
      <h2>إنشاء حساب Anime On</h2>

      <form id="signupForm">
        <div class="input-group">
          <label>الاسم الكامل</label>
          <input type="text" id="userName" placeholder="أدخل اسمك بالكامل" required />
        </div>

        <div class="input-group">
          <label>البريد الإلكتروني</label>
          <input type="email" id="userEmail" placeholder="example@mail.com" required />
        </div>

        <div class="input-group">
          <label>كلمة المرور</label>
          <input type="password" id="userPassword" placeholder="********" required />
        </div>

        <div class="input-group">
          <label>تأكيد كلمة المرور</label>
          <input type="password" id="confirmPassword" placeholder="********" required />
        </div>

        <button type="submit" class="signup-btn" id="signupBtn">اشترك الآن</button>
      </form>

      <div class="footer-links">
        لديك حساب بالفعل؟ <a href="Login.html">تسجيل الدخول</a>
      </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script src="../js/supabase-config.js"></script>
    <script>
      // Initialize EmailJS with your Public Key
      (function() {
          emailjs.init("Eo4wdYx57rOHdysj5");
      })();

      const signupForm = document.getElementById("signupForm");
      const signupBtn = document.getElementById("signupBtn");

      signupForm.addEventListener("submit", async function(e) {
        e.preventDefault();
        
        const name = document.getElementById("userName").value;
        const email = document.getElementById("userEmail").value;
        const password = document.getElementById("userPassword").value;
        const confirmPass = document.getElementById("confirmPassword").value;

        if (password !== confirmPass) {
          alert("كلمتا المرور غير متطابقتين!");
          return;
        }

        signupBtn.disabled = true;
        signupBtn.innerText = "جاري إنشاء الحساب وإرسال البريد...";

        try {
          // 1. Register user in Supabase
          const { data, error } = await _supabase.auth.signUp({
            email: email,
            password: password,
            options: {
              data: {
                full_name: name,
              }
            }
          });

          if (error) {
            alert("خطأ في إنشاء الحساب (Supabase): " + error.message);
          } else {
            // 2. Send welcome/verification email via EmailJS
            try {
              const templateParams = {
                user_name: name,
                to_email: email,
                message: "شكراً لانضمامك إلى Anime On! حسابك قيد التفعيل. يرجى التحقق من بريدك الإلكتروني لتأكيد التسجيل."
              };

              await emailjs.send("service_wbjwcsh", "template_ig7363r", templateParams);
              
              alert("تم إنشاء الحساب بنجاح! تم إرسال رسالة ترحيب لبريدك الإلكتروني.");
              window.location.href = "Login.html";
            } catch (emailErr) {
              console.error("EmailJS Error:", emailErr);
              alert("تم إنشاء الحساب في Supabase، ولكن فشل إرسال بريد الترحيب (EmailJS): " + (emailErr.text || emailErr.message || "خطأ غير معروف"));
              // بالرغم من خطأ البريد، الحساب قد تم إنشاؤه، لذا نوجهه لتسجيل الدخول
              window.location.href = "Login.html";
            }
          }
        } catch (err) {
          console.error("General Signup Error:", err);
          alert("حدث خطأ غير متوقع: " + err.message);
        } finally {
          signupBtn.disabled = false;
          signupBtn.innerText = "اشترك الآن";
        }
      });
    </script>
  </body>
</html>

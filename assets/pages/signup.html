<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>إنشاء حساب جديد | Anime On</title>
    <!-- Google Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <style>
      body {
        margin: 0;
        padding: 0;
        font-family: "Cairo", sans-serif;
        background: #0b0c10;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        color: white;
      }

      .signup-card {
        background: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(15px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 20px;
        padding: 30px;
        width: 380px;
        text-align: center;
        box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
        margin: 20px;
      }

      h2 {
        color: #45f3ff;
        margin-bottom: 20px;
        text-shadow: 0 0 10px rgba(69, 243, 255, 0.3);
      }

      .input-group {
        margin-bottom: 15px;
        text-align: right;
      }

      label {
        display: block;
        margin-bottom: 5px;
        font-size: 14px;
        color: #ccc;
      }

      input {
        width: 100%;
        padding: 10px;
        background: rgba(255, 255, 255, 0.1);
        border: 1px solid #444;
        border-radius: 8px;
        color: #fff;
        outline: none;
        transition: 0.3s;
        box-sizing: border-box;
      }

      input:focus {
        border-color: #45f3ff;
        box-shadow: 0 0 8px rgba(69, 243, 255, 0.3);
      }

      .signup-btn {
        width: 100%;
        padding: 12px;
        background: #45f3ff;
        border: none;
        border-radius: 8px;
        color: #0b0c10;
        font-weight: bold;
        font-size: 16px;
        cursor: pointer;
        transition: 0.3s;
        margin-top: 10px;
      }

      .signup-btn:hover {
        background: #33c7d1;
        transform: translateY(-2px);
      }

      .signup-btn:disabled {
        background: #999;
        cursor: not-allowed;
        transform: none;
      }

      .footer-links {
        margin-top: 20px;
        font-size: 14px;
      }

      .footer-links a {
        color: #45f3ff;
        text-decoration: none;
        font-weight: bold;
      }

      .alert {
        padding: 10px;
        margin-bottom: 15px;
        border-radius: 8px;
        text-align: center;
        display: none;
      }

      .alert.success {
        background: rgba(76, 175, 80, 0.3);
        color: #4caf50;
        border: 1px solid #4caf50;
        display: block;
      }

      .alert.error {
        background: rgba(244, 67, 54, 0.3);
        color: #f44336;
        border: 1px solid #f44336;
        display: block;
      }
    </style>
  </head>
  <body>
    <div class="signup-card">
      <h2>إنشاء حساب Anime On</h2>

      <div id="alertBox" class="alert"></div>

      <form id="signupForm">
        <div class="input-group">
          <label>الاسم الكامل</label>
          <input type="text" id="userName" placeholder="أدخل اسمك بالكامل" required />
        </div>

        <div class="input-group">
          <label>البريد الإلكتروني</label>
          <input type="email" id="userEmail" placeholder="example@mail.com" required />
        </div>

        <div class="input-group">
          <label>كلمة المرور</label>
          <input type="password" id="userPassword" placeholder="********" required />
        </div>

        <div class="input-group">
          <label>تأكيد كلمة المرور</label>
          <input type="password" id="confirmPassword" placeholder="********" required />
        </div>

        <button type="submit" class="signup-btn" id="signupBtn">اشترك الآن</button>
      </form>

      <div class="footer-links">
        لديك حساب بالفعل؟ <a href="Login.html">تسجيل الدخول</a>
      </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/supabase-config.js"></script>
    <script>
      const signupForm = document.getElementById("signupForm");
      const signupBtn = document.getElementById("signupBtn");
      const alertBox = document.getElementById("alertBox");

      function showAlert(message, type) {
        alertBox.textContent = message;
        alertBox.className = `alert ${type}`;
        setTimeout(() => {
          alertBox.className = "alert";
        }, 5000);
      }

      signupForm.addEventListener("submit", async function(e) {
        e.preventDefault();
        
        const name = document.getElementById("userName").value.trim();
        const email = document.getElementById("userEmail").value.trim();
        const password = document.getElementById("userPassword").value;
        const confirmPass = document.getElementById("confirmPassword").value;

        // التحقق من صحة البيانات
        if (!name || !email || !password || !confirmPass) {
          showAlert("يرجى ملء جميع الحقول المطلوبة", "error");
          return;
        }

        if (password.length < 6) {
          showAlert("كلمة المرور يجب أن تكون 6 أحرف على الأقل", "error");
          return;
        }

        if (password !== confirmPass) {
          showAlert("كلمتا المرور غير متطابقتين!", "error");
          return;
        }

        signupBtn.disabled = true;
        signupBtn.innerText = "جاري إنشاء الحساب...";

        try {
          // إنشاء الحساب في Supabase بدون التحقق من البريد الإلكتروني
          const { data, error } = await _supabase.auth.signUp({
            email: email,
            password: password,
            options: {
              data: {
                full_name: name,
              },
              emailRedirectTo: undefined // إلغاء رسالة التحقق
            }
          });

          if (error) {
            showAlert("خطأ في إنشاء الحساب: " + error.message, "error");
          } else if (data.user) {
            showAlert("تم إنشاء الحساب بنجاح! يتم توجيهك لصفحة تسجيل الدخول...", "success");
            
            // تأخير قبل التوجيه للسماح للمستخدم برؤية الرسالة
            setTimeout(() => {
              window.location.href = "Login.html";
            }, 2000);
          }
        } catch (err) {
          console.error("Signup Error:", err);
          showAlert("حدث خطأ غير متوقع: " + (err.message || "حاول مرة أخرى"), "error");
        } finally {
          signupBtn.disabled = false;
          signupBtn.innerText = "اشترك الآن";
        }
      });
    </script>
  </body>
</html>
